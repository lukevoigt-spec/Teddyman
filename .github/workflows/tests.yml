name: tests
on:
  push:
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Syntax-check every JS file
        run: for f in *.js; do echo "checking $f"; node --check "$f"; done
      - name: Curriculum + invariant tests
        run: node tests/curriculum.test.js
      - name: Save-layer tests
        run: node tests/save.test.js
